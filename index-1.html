<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flap Bird</title>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff7a5c">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html, body {
    height:100%; overflow:hidden;
    background: #1b1035;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    touch-action: manipulation;
  }
  #wrap {
    position:relative; width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
  }
  canvas {
    background: linear-gradient(#ffb84d 0%, #ff7a5c 35%, #7b3fb0 70%, #2a1250 100%);
    display:block;
    max-width:100%; max-height:100%;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
  }
  #hud {
    position:absolute; top:24px; left:0; right:0;
    text-align:center; pointer-events:none;
    color:#fff8ec;
    text-shadow: 0 3px 0 rgba(0,0,0,0.35);
  }
  #score {
    font-size:56px; font-weight:800; letter-spacing:2px;
  }
  #msg {
    position:absolute; top:50%; left:0; right:0;
    transform:translateY(-50%);
    text-align:center; color:#fff8ec;
    text-shadow: 0 3px 0 rgba(0,0,0,0.35);
  }
  #cover {
    width:120px; height:120px; border-radius:28px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    margin-bottom:18px;
  }
  #msg h1 {
    font-size:44px; letter-spacing:3px; margin-bottom:10px;
    color:#ffe08a;
  }
  #msg p { font-size:18px; opacity:0.9; }
  #best { font-size:14px; margin-top:14px; opacity:0.8; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="640"></canvas>
  <div id="hud"><div id="score">0</div></div>
  <div id="msg">
    <img id="cover" src="icon-192.png" alt="Flap Bird">
    <h1>FLAP BIRD</h1>
    <p>Toque ou aperte espaço para voar</p>
    <div id="best">Recorde: 0</div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');
const bestEl = document.getElementById('best');

const W = canvas.width, H = canvas.height;

const GRAVITY = 0.45;
const FLAP = -8;
const PIPE_GAP = 165;
const PIPE_W = 62;
const PIPE_SPEED = 2.6;
const GROUND_H = 90;

let state = 'ready'; // ready, playing, dead
let frame = 0;
let score = 0;
let best = parseInt(localStorage.getItem('flapBirdBest') || '0', 10);
bestEl.textContent = 'Recorde: ' + best;

let bird = { x: 110, y: H/2, vy: 0, r: 16, rot: 0 };
let pipes = [];
let particles = [];

// --- Sound effects (Web Audio API, no external files needed) ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playTone(freq, duration, type, startGain, endGain, delay) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  const t0 = ctx.currentTime + (delay || 0);
  gain.gain.setValueAtTime(startGain != null ? startGain : 0.2, t0);
  gain.gain.exponentialRampToValueAtTime(Math.max(endGain != null ? endGain : 0.001, 0.001), t0 + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}
function sfxFlap() {
  playTone(520, 0.11, 'square', 0.15, 0.001, 0);
  playTone(700, 0.08, 'square', 0.08, 0.001, 0.02);
}
function sfxScore() {
  playTone(880, 0.09, 'sine', 0.18, 0.001, 0);
  playTone(1180, 0.12, 'sine', 0.15, 0.001, 0.07);
}
function sfxHit() {
  playTone(160, 0.25, 'sawtooth', 0.22, 0.001, 0);
  playTone(90, 0.35, 'square', 0.18, 0.001, 0.05);
}

function resetGame() {
  bird = { x: 110, y: H/2, vy: 0, r: 16, rot: 0 };
  pipes = [];
  particles = [];
  score = 0;
  frame = 0;
  scoreEl.textContent = '0';
}

function spawnPipe() {
  const margin = 60;
  const top = margin + Math.random() * (H - GROUND_H - PIPE_GAP - margin*2);
  pipes.push({ x: W + PIPE_W, top: top, passed: false });
}

function flap() {
  if (state === 'ready') {
    state = 'playing';
    msgEl.classList.add('hidden');
    resetGame();
    bird.vy = FLAP;
    sfxFlap();
  } else if (state === 'playing') {
    bird.vy = FLAP;
    sfxFlap();
    for (let i=0;i<6;i++){
      particles.push({x:bird.x-10, y:bird.y+10, vx:-2-Math.random()*2, vy:(Math.random()-0.5)*2, life:20, c: '#ffe08a'});
    }
  } else if (state === 'dead') {
    state = 'ready';
    msgEl.classList.remove('hidden');
    msgEl.querySelector('h1').textContent = 'FLAP BIRD';
    msgEl.querySelector('p').textContent = 'Toque ou aperte espaço para voar';
    resetGame();
  }
}

function rectCircleColl(cx, cy, r, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx+rw));
  const closestY = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx - closestX, dy = cy - closestY;
  return (dx*dx + dy*dy) < r*r;
}

function update() {
  if (state !== 'playing') return;
  frame++;

  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rot = Math.max(-0.5, Math.min(1.3, bird.vy / 10));

  if (frame % 95 === 0) spawnPipe();

  for (const p of pipes) {
    p.x -= PIPE_SPEED;
    if (!p.passed && p.x + PIPE_W < bird.x - bird.r) {
      p.passed = true;
      score++;
      scoreEl.textContent = score;
      sfxScore();
    }
  }
  pipes = pipes.filter(p => p.x > -PIPE_W - 10);

  for (const p of particles) { p.x += p.vx; p.y += p.vy; p.life--; }
  particles = particles.filter(p => p.life > 0);

  let dead = false;
  if (bird.y + bird.r > H - GROUND_H || bird.y - bird.r < 0) dead = true;
  for (const p of pipes) {
    if (rectCircleColl(bird.x, bird.y, bird.r-3, p.x, 0, PIPE_W, p.top)) dead = true;
    if (rectCircleColl(bird.x, bird.y, bird.r-3, p.x, p.top+PIPE_GAP, PIPE_W, H)) dead = true;
  }

  if (dead) {
    state = 'dead';
    sfxHit();
    if (score > best) {
      best = score;
      localStorage.setItem('flapBirdBest', best);
    }
    bestEl.textContent = 'Recorde: ' + best;
    msgEl.classList.remove('hidden');
    msgEl.querySelector('h1').textContent = 'Você bateu!';
    msgEl.querySelector('p').textContent = 'Toque para jogar de novo · Pontos: ' + score;
  }
}

function drawBackgroundDecor() {
  // sun
  ctx.beginPath();
  ctx.arc(W-90, 110, 42, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fill();

  // distant mountains
  ctx.fillStyle = 'rgba(40,15,70,0.55)';
  ctx.beginPath();
  ctx.moveTo(0, H-GROUND_H);
  ctx.lineTo(0, H-GROUND_H-70);
  ctx.lineTo(70, H-GROUND_H-130);
  ctx.lineTo(150, H-GROUND_H-60);
  ctx.lineTo(230, H-GROUND_H-140);
  ctx.lineTo(320, H-GROUND_H-70);
  ctx.lineTo(400, H-GROUND_H-120);
  ctx.lineTo(W, H-GROUND_H-50);
  ctx.lineTo(W, H-GROUND_H);
  ctx.closePath();
  ctx.fill();
}

function drawPipe(p) {
  const grad = ctx.createLinearGradient(p.x, 0, p.x+PIPE_W, 0);
  grad.addColorStop(0, '#3ddc84');
  grad.addColorStop(0.5, '#25b866');
  grad.addColorStop(1, '#1a8f4e');
  ctx.fillStyle = grad;

  ctx.fillRect(p.x, 0, PIPE_W, p.top);
  ctx.fillRect(p.x-5, p.top-24, PIPE_W+10, 24);

  const bottomY = p.top + PIPE_GAP;
  ctx.fillRect(p.x, bottomY, PIPE_W, H - GROUND_H - bottomY);
  ctx.fillRect(p.x-5, bottomY, PIPE_W+10, 24);

  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 3;
  ctx.strokeRect(p.x, 0, PIPE_W, p.top);
  ctx.strokeRect(p.x, bottomY, PIPE_W, H - GROUND_H - bottomY);
}

function drawGround() {
  ctx.fillStyle = '#6b3f2a';
  ctx.fillRect(0, H-GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#8a5a3a';
  ctx.fillRect(0, H-GROUND_H, W, 14);

  const offset = (frame * PIPE_SPEED) % 40;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (let x = -40 + (state==='playing' ? -offset : 0); x < W; x += 40) {
    ctx.fillRect(x, H-GROUND_H+20, 20, 8);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.rot);

  // wing
  const wingFlap = Math.sin(frame*0.4) * 6;
  ctx.beginPath();
  ctx.ellipse(-4, 4+wingFlap, 10, 6, 0.3, 0, Math.PI*2);
  ctx.fillStyle = '#ffcf4d';
  ctx.fill();

  // body
  ctx.beginPath();
  ctx.arc(0, 0, bird.r, 0, Math.PI*2);
  ctx.fillStyle = '#ffe08a';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // eye
  ctx.beginPath();
  ctx.arc(6, -5, 4, 0, Math.PI*2);
  ctx.fillStyle = '#2a1250';
  ctx.fill();

  // beak
  ctx.beginPath();
  ctx.moveTo(bird.r-4, -2);
  ctx.lineTo(bird.r+10, 2);
  ctx.lineTo(bird.r-4, 6);
  ctx.closePath();
  ctx.fillStyle = '#ff7a3d';
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / 20;
    ctx.fillStyle = p.c;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackgroundDecor();
  for (const p of pipes) drawPipe(p);
  drawParticles();
  drawBird();
  drawGround();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); flap(); }
});
canvas.addEventListener('pointerdown', (e) => { e.preventDefault(); flap(); });
document.getElementById('wrap').addEventListener('pointerdown', (e) => { flap(); });

loop();
</script>
</body>
</html>
